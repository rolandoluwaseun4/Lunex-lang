<!-- Lunex runtime — inlined so there are zero external dependencies -->

<script>
(function(){
  function output(val){
    const el=document.getElementById('lunex-output');
    if(el){const d=document.createElement('div');d.textContent=val;el.appendChild(d);}
    else console.log('[Lunex]',val);
  }
  function getRoot(){return document.getElementById('lunex-app')||document.body;}
  const elements={};

  async function lunex(code){
    const lines=code.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('//'));
    const vars={},funcs={};
    let i=0;
    while(i<lines.length){
      if(lines[i].startsWith('assign ')){
        const name=lines[i].slice(7).replace(/:$/,'').trim();
        const body=[];i++;
        while(i<lines.length&&!lines[i].startsWith('end')){body.push(lines[i]);i++;}
        funcs[name]=body;
      }
      i++;
    }
    i=0;
    while(i<lines.length){
      if(lines[i].startsWith('assign ')){
        i++;while(i<lines.length&&!lines[i].startsWith('end'))i++;i++;continue;
      }
      try{await runLine(lines[i],vars,funcs);}
      catch(e){console.warn('[Lunex line error]',lines[i].slice(0,50),e.message);}
      i++;
    }
  }

  async function runLine(line,vars,funcs){
    line=line.trim();
    if(!line||line.startsWith('//'))return;

    if(line.startsWith('dsp ')){
      output(ev(line.slice(4).replace(/\.$/,'').trim(),vars));
    }
    else if(line.startsWith('make ')){
      const raw=line.slice(5).replace(/\.$/,'').trim();
      const eq=raw.indexOf('=');
      if(eq===-1)return;
      vars[raw.slice(0,eq).trim()]=ev(raw.slice(eq+1).trim(),vars);
    }
    else if(line.startsWith('store ')){
      const raw=line.replace(/\.$/,'').slice(6).trim();
      const ai=raw.indexOf(' ask ');if(ai===-1)return;
      const vn=raw.slice(0,ai).trim();
      const q=raw.slice(ai+5).trim().replace(/^"|"$/g,'');
      const ans=window.prompt(q)||'';
      vars[vn]=isNaN(ans)||ans===''?ans:Number(ans);
    }
    else if(line.startsWith('if ')){
      const ci=line.indexOf(':');if(ci===-1)return;
      const cond=line.slice(3,ci).trim();
      const rest=line.slice(ci+1).trim();
      const oi=rest.toLowerCase().indexOf('otherwise:');
      let then_=rest,else_=null;
      if(oi!==-1){then_=rest.slice(0,oi).trim();else_=rest.slice(oi+10).trim();}
      if(evalCond(cond,vars))await runLine(then_,vars,funcs);
      else if(else_)await runLine(else_,vars,funcs);
    }
    else if(line.startsWith('loop ')){
      const ci=line.indexOf(':');if(ci===-1)return;
      const def=line.slice(5,ci).trim();
      const body=line.slice(ci+1).trim();
      if(def.endsWith('times')){
        const n=Number(ev(def.slice(0,def.lastIndexOf('times')).trim(),vars));
        for(let k=0;k<n;k++){vars['index']=k+1;await runLine(body,vars,funcs);}
      }else if(def.startsWith('through ')){
        const list=vars[def.slice(8).trim()];
        if(!Array.isArray(list))return;
        for(let k=0;k<list.length;k++){vars['item']=list[k];vars['index']=k+1;await runLine(body,vars,funcs);}
      }
    }
    else if(line.startsWith('rev ')){
      vars['__return__']=ev(line.slice(4).replace(/\.$/,'').trim(),vars);
    }
    else if(line.startsWith('create ')){
      const raw=line.slice(7).replace(/\.$/,'').trim();
      const ai=raw.indexOf(' as ');if(ai===-1)return;
      const elName=raw.slice(0,ai).trim();
      const rest=raw.slice(ai+4).trim();
      const si=rest.search(/\s/);
      const tag=si===-1?rest:rest.slice(0,si).trim();
      const propStr=si===-1?'':rest.slice(si).trim();
      const el=document.createElement(tag);
      el.id='lunex-'+elName;
      if(tag==='button'||tag==='input'){el.style.webkitAppearance='none';el.style.appearance='none';}
      applyProps(el,propStr);
      elements[elName]=el;vars[elName]=elName;
    }
    else if(line.startsWith('row ')){
      const raw=line.slice(4).replace(/\.$/,'').trim();
      const si=raw.search(/\s/);
      const elName=si===-1?raw:raw.slice(0,si);
      const propStr=si===-1?'':raw.slice(si).trim();
      const el=document.createElement('div');
      el.id='lunex-'+elName;
      el.style.display='flex';el.style.flexDirection='row';el.style.alignItems='center';
      applyProps(el,propStr);
      elements[elName]=el;vars[elName]=elName;
    }
    else if(line.startsWith('col ')){
      const raw=line.slice(4).replace(/\.$/,'').trim();
      const si=raw.search(/\s/);
      const elName=si===-1?raw:raw.slice(0,si);
      const propStr=si===-1?'':raw.slice(si).trim();
      const el=document.createElement('div');
      el.id='lunex-'+elName;
      el.style.display='flex';el.style.flexDirection='column';
      applyProps(el,propStr);
      elements[elName]=el;vars[elName]=elName;
    }
    else if(line.startsWith('place ')){
      const raw=line.slice(6).replace(/\.$/,'').trim();
      if(raw.includes(' inside ')){
        const p=raw.split(' inside ');
        const el=elements[p[0].trim()];
        const pn=p[1].trim();
        const parent=pn==='page'?getRoot():(elements[pn]||document.getElementById('lunex-'+pn));
        if(el&&parent)parent.appendChild(el);
      }else{
        const el=elements[raw.trim()];
        if(el)getRoot().appendChild(el);
      }
    }
    else if(line.startsWith('show ')){
      const el=elements[line.slice(5).replace(/\.$/,'').trim()];
      if(el)el.style.display=el._pd||'block';
    }
    else if(line.startsWith('hide ')){
      const el=elements[line.slice(5).replace(/\.$/,'').trim()];
      if(el){el._pd=el.style.display;el.style.display='none';}
    }
    else if(line.startsWith('on ')){
      const raw=line.slice(3).replace(/\.$/,'').trim();
      const ci=raw.indexOf(':');if(ci===-1)return;
      const parts=raw.slice(0,ci).trim().split(' ');
      const el=elements[parts[0].trim()];
      const evt=parts[1]?.trim()||'click';
      const action=raw.slice(ci+1).trim();
      if(el){const sv=vars,sf=funcs;el.addEventListener(evt,()=>runLine(action,sv,sf).catch(()=>{}));}
    }
    else if(line.startsWith('change ')){
      const raw=line.slice(7).replace(/\.$/,'').trim();
      const ti=raw.indexOf(' to ');if(ti===-1)return;
      const el=elements[raw.slice(0,ti).trim()];
      if(el)el.textContent=String(ev(raw.slice(ti+4).trim(),vars));
    }
    else if(line.startsWith('get ')){
      const raw=line.slice(4).replace(/\.$/,'').trim();
      const ai=raw.indexOf(' as ');if(ai===-1)return;
      const el=elements[raw.slice(0,ai).trim()];
      if(!el)return;
      const val=el.value||el.textContent;
      vars[raw.slice(ai+4).trim()]=isNaN(val)?val:Number(val);
    }
    else if(funcs[line.replace(/\.$/,'').trim()]){
      await runFunc(line.replace(/\.$/,'').trim(),{},vars,funcs);
    }
    else if(line.includes(' with ')&&funcs[line.split(' with ')[0].trim()]){
      const p=line.split(' with ');
      const fn=p[0].trim();const lv={...vars};
      p[1].replace(/\.$/,'').trim().split(',').forEach(arg=>{
        const eq=arg.indexOf('=');
        if(eq!==-1)lv[arg.slice(0,eq).trim()]=ev(arg.slice(eq+1).trim(),vars);
      });
      await runFunc(fn,lv,vars,funcs);
    }
  }

  function applyProps(el,propStr){
    if(!propStr)return;
    const re=/(\w+)="([^"]*)"/g;let m;
    while((m=re.exec(propStr))!==null){
      const key=m[1],val=m[2];
      if(key==='text')el.textContent=val;
      else if(key==='html')el.innerHTML=val;
      else if(key==='placeholder')el.placeholder=val;
      else if(key==='value')el.value=val;
      else if(key==='src')el.src=val;
      else if(key==='href')el.href=val;
      else if(key==='type')el.type=val;
      else if(key==='class')el.className=val;
      else if(key==='id')el.id=val;
      else if(key==='target')el.target=val;
      else{
        el.style[key]=val;
        if(key==='backdropFilter')el.style.webkitBackdropFilter=val;
      }
    }
  }

  async function runFunc(name,lv,vars,funcs){
    const body=funcs[name];if(!body)return;
    const scope={...vars,...lv,__return__:undefined};
    for(const line of body){
      await runLine(line,scope,funcs);
      if(scope['__return__']!==undefined)break;
    }
    if(scope['__return__']!==undefined)vars['result']=scope['__return__'];
  }

  function evalCond(cond,vars){
    for(const op of['>=','<=','!=','>','<','=']){
      const i=cond.indexOf(op);if(i===-1)continue;
      const l=ev(cond.slice(0,i).trim(),vars);
      const r=ev(cond.slice(i+op.length).trim(),vars);
      if(op==='>')return l>r;if(op==='<')return l<r;
      if(op==='>=')return l>=r;if(op==='<=')return l<=r;
      if(op==='!=')return l!=r;if(op==='=')return l==r;
    }
    return false;
  }

  function splitOp(expr,op){
    const parts=[];let cur='',inStr=false,sc='';
    for(let i=0;i<expr.length;i++){
      const c=expr[i];
      if(!inStr&&(c==='"'||c==="'")){inStr=true;sc=c;cur+=c;}
      else if(inStr&&c===sc){inStr=false;cur+=c;}
      else if(!inStr&&c===op){parts.push(cur.trim());cur='';}
      else cur+=c;
    }
    if(cur.trim())parts.push(cur.trim());
    return parts;
  }

  function ev(expr,vars){
    expr=expr.trim();
    if(expr.startsWith('[')&&expr.endsWith(']'))
      return expr.slice(1,-1).split(',').map(i=>ev(i.trim(),vars));
    if((expr.startsWith('"')&&expr.endsWith('"'))||
       (expr.startsWith("'")&&expr.endsWith("'"))&&expr.length>=2)
      return expr.slice(1,-1);
    if(expr!==''&&!isNaN(expr))return Number(expr);
    if(Object.prototype.hasOwnProperty.call(vars,expr))return vars[expr];
    if(expr.includes('+')){
      const p=splitOp(expr,'+');
      if(p.length>1){const e=p.map(x=>ev(x,vars));return e.every(x=>typeof x==='number')?e.reduce((a,b)=>a+b,0):e.map(x=>x===undefined?'':x).join('');}
    }
    if(expr.includes('*')){
      const p=splitOp(expr,'*');
      if(p.length>1){const e=p.map(x=>ev(x,vars));if(e.every(x=>typeof x==='number'))return e.reduce((a,b)=>a*b,1);}
    }
    if(expr.includes('-')&&!/^-[\d.]/.test(expr)){
      const p=splitOp(expr,'-');
      if(p.length>1){const e=p.map(x=>ev(x,vars));if(e.every(x=>typeof x==='number'))return e.reduce((a,b)=>a-b);}
    }
    if(expr.includes('/')){
      const p=splitOp(expr,'/');
      if(p.length>1){const e=p.map(x=>ev(x,vars));if(e.every(x=>typeof x==='number'))return e.reduce((a,b)=>a/b);}
    }
    return expr;
  }

  window.lunex=lunex;
  window._lunexRun=lunex; // playground compat alias

  // Auto-run text/lunex scripts
  function run(){
    document.querySelectorAll('script[type="text/lunex"]').forEach(s=>{
      lunex(s.textContent).catch(e=>console.error('[Lunex]',e));
    });
  }
  if(document.readyState==='loading')window.addEventListener('DOMContentLoaded',run);
  else run();
})();
</script>
